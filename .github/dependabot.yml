version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine minor/patch bumps; majors (e.g. Next) come separately.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Toolchain majors are coupled to Next/eslint-config-next and broke CI when
      # attempted (TS 7, ESLint 10). Handle these deliberately, not via auto-PRs.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
