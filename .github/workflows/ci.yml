name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Regenerate embedded content
        run: npm run content

      - name: Fail if content is out of sync (edit content/, run `npm run content`)
        run: git diff --exit-code src/lib/mdFiles.json src/lib/mdFileKeys.json

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (guards)
        run: npm run test

      - name: Build
        run: npm run build
